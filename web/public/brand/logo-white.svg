<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="100%" height="100%">
  <defs>
    <!-- Left Wing Gradient: Electric Blue -->
    <linearGradient id="leftWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    
    <!-- Right Wing Gradient: Indigo Violet -->
    <linearGradient id="rightWing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    
    <!-- Center Keel/Shadow Gradient -->
    <linearGradient id="centerKeel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" />
      <stop offset="100%" stop-color="#312E81" />
    </linearGradient>
    
    <!-- Trail Swoop Gradient: Pink to Purple Accent -->
    <linearGradient id="trailSwoop" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EC4899" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    
    <!-- Luminous Text Gradient for 'Pilot' (optimized for dark bg) -->
    <linearGradient id="textGradWhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#38BDF8" />
    </linearGradient>

    <!-- Drop Shadow for Depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Logo Mark (scaled and translated) -->
  <g transform="translate(10, 0) scale(0.8)" filter="url(#shadow)">
    <!-- Swooping social trail lines -->
    <path d="M15,82 C30,85 52,70 50,42" fill="none" stroke="url(#trailSwoop)" stroke-width="4.5" stroke-linecap="round" />
    <path d="M22,90 C42,92 64,72 58,45" fill="none" stroke="url(#trailSwoop)" stroke-width="2.5" stroke-linecap="round" opacity="0.6" />
    <circle cx="15" cy="82" r="3" fill="#EC4899" />
    <circle cx="22" cy="90" r="2" fill="#8B5CF6" />
    
    <!-- Airplane facets -->
    <path d="M50,15 L50,75 L30,55 Z" fill="url(#centerKeel)" />
    <path d="M50,15 L30,55 L12,48 Z" fill="url(#leftWing)" />
    <path d="M50,15 L88,48 L50,75 Z" fill="url(#rightWing)" />
    <path d="M50,75 L88,48 L70,55 Z" fill="#4338CA" opacity="0.4" />
    <circle cx="50" cy="15" r="2.5" fill="#60A5FA" />
  </g>

  <!-- Brand Typography -->
  <text x="96" y="52" font-family="'Plus Jakarta Sans', 'Inter', system-ui, -apple-system, sans-serif" font-size="34px" font-weight="800" letter-spacing="-1px">
    <tspan fill="#FFFFFF">Post</tspan>
    <tspan fill="url(#textGradWhite)">Pilot</tspan>
  </text>
</svg>
